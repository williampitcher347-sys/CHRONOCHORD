<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronochord</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#202225;color:#fff;display:flex;height:100vh;position:relative;}
#app{display:flex;width:100%;height:100%;flex-direction:row;}
#sidebar{width:220px;background:#2f3136;display:flex;flex-direction:column;}
#sidebar h2{text-align:center;padding:16px 0;font-weight:normal;font-size:1.2em;border-bottom:1px solid #202225;}
#serverSearch{padding:8px 10px;margin:10px;border-radius:4px;border:none;width:calc(100% - 40px);}
#servers{flex:1;overflow-y:auto;padding:10px;}
.server{padding:8px 12px;border-radius:4px;margin-bottom:4px;cursor:pointer;}
.server:hover,.server.active{background:#393c43;}
#rooms{margin-top:10px;padding:10px;flex:0 0 auto;}
.room{padding:6px;cursor:pointer;border-radius:4px;margin-bottom:4px;}
.room:hover,.room.active{background:#393c43;}
#main{flex:1;display:flex;flex-direction:column;}
#chatHeader{padding:16px;background:#2f3136;border-bottom:1px solid #202225;font-weight:bold;}
#messages{flex:1;padding:12px;overflow-y:auto;}
.message{margin-bottom:12px;}
.message strong{color:#ffa500;}
.timestamp{color:#72767d;font-size:0.75em;margin-left:6px;}
#inputArea{display:flex;padding:10px;background:#40444b;border-top:1px solid #2f3136;}
#usernamePrompt{padding:10px;border:none;border-radius:4px;background:#303339;color:white;width:150px;margin-right:8px;}
#messageInput{flex:1;padding:10px;border:none;border-radius:4px;background:#303339;color:#fff;}
#messageInput:focus{outline:none;}
#sendButton{padding:10px 16px;margin-left:8px;border:none;border-radius:4px;background:#7289da;color:white;cursor:pointer;}
#createServerBtn{padding:6px 10px;border:none;border-radius:4px;background:#7289da;color:white;margin-left:8px;}
</style>
</head>
<body>

<div id="app">
  <div id="sidebar">
    <h2>Servers</h2>
    <input type="text" id="serverSearch" placeholder="Search server...">
    <div id="servers"></div>
    <button id="createServerBtn">+ Create Server</button>
    <div id="rooms"></div>
  </div>
  <div id="main">
    <div id="chatHeader">#general</div>
    <div id="messages"></div>
    <div id="inputArea">
      <input type="text" id="usernamePrompt" placeholder="Your name">
      <input type="text" id="messageInput" placeholder="Type a message...">
      <button id="sendButton">Send</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, get } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDNRjsEudctz8T1iYlz0AapPZPQBgoIwAQ",
  authDomain: "chronochordbackend.firebaseapp.com",
  databaseURL: "https://chronochordbackend-default-rtdb.firebaseio.com",
  projectId: "chronochordbackend",
  storageBucket: "chronochordbackend.firebasestorage.app",
  messagingSenderId: "321151014715",
  appId: "1:321151014715:web:76cec0fb45aa2c0bfbc91e",
  measurementId: "G-XBRJGYY2G2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let username='', userId='', activeServer='', activeRoom='general';

// ---------------- AUTH ----------------
signInAnonymously(auth).then(async userCredential=>{
  userId = userCredential.user.uid;
  const serversSnap = await get(ref(db,'servers'));
  if(!serversSnap.exists()){
    // create default server with 3 rooms
    const newServer = push(ref(db,'servers'));
    await set(newServer,{
      name:'Default Server',
      channels:{
        general:{messages:{}},
        random:{messages:{}},
        games:{messages:{}}
      }
    });
  }
  initServers();
});

// ---------------- SERVERS ----------------
function initServers(){
  const serversRef = ref(db,'servers');
  onValue(serversRef,(snapshot)=>{
    const servers = snapshot.val()||{};
    const serversDiv = document.getElementById('servers');
    serversDiv.innerHTML='';
    Object.keys(servers).forEach(s=>{
      const div = document.createElement('div');
      div.className='server'+(s===activeServer?' active':'');
      div.textContent=servers[s].name;
      div.addEventListener('click',()=>switchServer(s,servers[s].name,servers[s].channels));
      serversDiv.appendChild(div);
    });
    if(!activeServer && Object.keys(servers)[0]){
      const first = Object.keys(servers)[0];
      switchServer(first,servers[first].name,servers[first].channels);
    }
  });
}

document.getElementById('createServerBtn').addEventListener('click', async ()=>{
  const name = prompt('Server name:');
  if(!name) return;
  const newServerRef = push(ref(db,'servers'));
  await set(newServerRef,{
    name,
    channels:{
      general:{messages:{}},
      random:{messages:{}},
      games:{messages:{}}
    }
  });
});

// server search
document.getElementById('serverSearch').addEventListener('input', ()=>{
  const filter = document.getElementById('serverSearch').value.toLowerCase();
  document.querySelectorAll('.server').forEach(s=>{
    s.style.display = s.textContent.toLowerCase().includes(filter)?'block':'none';
  });
});

function switchServer(id,name,channels){
  activeServer=id;
  activeRoom='general';
  renderRooms(channels);
  document.getElementById('chatHeader').textContent='#'+activeRoom+' - '+name;
  loadMessages();
}

function renderRooms(channels){
  const roomsDiv = document.getElementById('rooms');
  roomsDiv.innerHTML='';
  Object.keys(channels).forEach(room=>{
    const div = document.createElement('div');
    div.className='room'+(room===activeRoom?' active':'');
    div.textContent=room;
    div.addEventListener('click',()=>switchRoom(room));
    roomsDiv.appendChild(div);
  });
}

function switchRoom(room){
  activeRoom=room;
  document.querySelectorAll('.room').forEach(r=>r.classList.remove('active'));
  document.querySelectorAll('.room').forEach(r=>{
    if(r.textContent===room) r.classList.add('active');
  });
  document.getElementById('chatHeader').textContent='#'+activeRoom;
  loadMessages();
}

// ---------------- MESSAGES ----------------
document.getElementById('sendButton').addEventListener('click', sendMessage);

function loadMessages(){
  const messagesDiv = document.getElementById('messages');
  messagesDiv.innerHTML='';
  if(activeServer && activeRoom){
    const chatRef = ref(db,`servers/${activeServer}/channels/${activeRoom}/messages`);
    onValue(chatRef,(snapshot)=>{
      const msgs = snapshot.val()||{};
      messagesDiv.innerHTML='';
      Object.values(msgs).forEach(m=>{
        const div = document.createElement('div');
        div.className='message';
        div.innerHTML=`<strong>${m.username}</strong><span class="timestamp">${new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>: ${m.text}`;
        messagesDiv.appendChild(div);
      });
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
  }
}

function sendMessage(){
  const input = document.getElementById('messageInput');
  const nameInput = document.getElementById('usernamePrompt');
  if(!input.value.trim()) return;
  if(!nameInput.value.trim()) return alert('Enter your display name!');
  username=nameInput.value.trim();
  const time = Date.now();

  if(activeServer && activeRoom){
    const chatRef = ref(db,`servers/${activeServer}/channels/${activeRoom}/messages`);
    const newMsgRef = push(chatRef);
    set(newMsgRef,{username,text:input.value.trim(),userId,timestamp:time});
  }
  input.value='';
}

</script>
</body>
</html>
