<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronochord</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  height:100vh;
  overflow:hidden;
}

/* Unlock Screen */

#unlockScreen{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at center,#1e3a8a,#020617);
  animation:fadeIn 1s;
}

#unlockBox{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  text-align:center;
}

#unlockBox h2{
  margin-bottom:10px;
}

#unlockBox input{
  padding:8px;
  border:none;
  border-radius:8px;
  margin-top:10px;
  width:150px;
  text-align:center;
}

#unlockBox button{
  margin-top:10px;
  padding:8px 14px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#2563eb,#10b981);
  color:white;
  cursor:pointer;
  transition:.25s;
}

#unlockBox button:hover{
  transform:scale(1.05);
}

/* App Layout */

#app{
  display:none;
  height:100%;
  animation:fadeIn .6s;
}

#sidebar{
  width:220px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-right:1px solid rgba(255,255,255,0.08);
  display:flex;
  flex-direction:column;
}

#sidebar h2{
  padding:16px;
  text-align:center;
  font-weight:500;
  letter-spacing:1px;
}

#servers{
  flex:1;
  overflow:auto;
  padding:10px;
}

.server{
  padding:8px 12px;
  border-radius:10px;
  margin-bottom:6px;
  cursor:pointer;
  font-size:.9em;
  background:rgba(255,255,255,0.05);
  transition:.25s;
}

.server:hover{
  background:linear-gradient(45deg,#2563eb,#10b981);
}

.server.active{
  background:linear-gradient(45deg,#2563eb,#10b981);
  box-shadow:0 0 10px rgba(16,185,129,.6);
}

#createServerBtn{
  margin:10px;
  padding:8px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#2563eb,#10b981);
  color:white;
  cursor:pointer;
}

#rooms{
  padding:10px;
  border-top:1px solid rgba(255,255,255,0.08);
}

.room{
  padding:6px 10px;
  border-radius:8px;
  margin-bottom:5px;
  cursor:pointer;
  font-size:.85em;
  transition:.2s;
}

.room:hover{
  background:#10b981;
}

.room.active{
  background:#10b981;
}

/* Main */

#main{
  flex:1;
  display:flex;
  flex-direction:column;
}

#chatHeader{
  padding:14px;
  font-weight:500;
  background:rgba(255,255,255,0.05);
  border-bottom:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
}

#messages{
  flex:1;
  overflow:auto;
  padding:15px;
}

.message{
  max-width:65%;
  padding:8px 12px;
  border-radius:12px;
  margin-bottom:8px;
  animation:msgIn .25s;
  font-size:.85em;
}

.self{
  margin-left:auto;
  background:linear-gradient(45deg,#10b981,#059669);
}

.other{
  margin-right:auto;
  background:#374151;
}

.timestamp{
  font-size:.6em;
  opacity:.7;
  text-align:right;
}

/* Input */

#inputArea{
  display:flex;
  padding:10px;
  gap:6px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
}

#inputArea input{
  padding:8px;
  border:none;
  border-radius:8px;
  background:#020617;
  color:white;
}

#messageInput{
  flex:1;
}

#sendButton{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#2563eb,#10b981);
  color:white;
  cursor:pointer;
}

/* Animations */

@keyframes fadeIn{
  from{opacity:0;transform:scale(.95);}
  to{opacity:1;transform:scale(1);}
}

@keyframes msgIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background:#10b981;border-radius:10px;}
</style>
</head>

<body>

<div id="unlockScreen">
  <div id="unlockBox">
    <h2>Chronochord</h2>
    <p>Enter Access Code</p>
    <input id="codeInput" type="password">
    <br>
    <button onclick="unlock()">Enter</button>
  </div>
</div>

<div id="app">

  <div id="sidebar">
    <h2>Servers</h2>
    <div id="servers"></div>
    <button id="createServerBtn">+ Server</button>
    <div id="rooms"></div>
  </div>

  <div id="main">
    <div id="chatHeader">Chat</div>
    <div id="messages"></div>

    <div id="inputArea">
      <input id="usernamePrompt" placeholder="Name">
      <input id="messageInput" placeholder="Message">
      <button id="sendButton">Send</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDNRjsEudctz8T1iYlz0AapPZPQBgoIwAQ",
  authDomain: "chronochordbackend.firebaseapp.com",
  databaseURL: "https://chronochordbackend-default-rtdb.firebaseio.com",
  projectId: "chronochordbackend"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let userId='';
let activeServer='';
let activeRoom='Chat 1';

window.unlock = async ()=>{
  if(document.getElementById('codeInput').value==='2013'){
    document.getElementById('unlockScreen').style.display='none';
    document.getElementById('app').style.display='flex';

    const user = await signInAnonymously(auth);
    userId = user.user.uid;

    initServers();
  }else{
    alert("Wrong code");
  }
};

function initServers(){
  const serversRef = ref(db,'servers');

  onValue(serversRef,snap=>{
    const data = snap.val()||{};
    const list = document.getElementById('servers');
    list.innerHTML='';

    Object.keys(data).forEach(id=>{
      const s = data[id];

      const div=document.createElement('div');
      div.className='server'+(id===activeServer?' active':'');
      div.textContent=s.name;

      div.onclick=()=>enterServer(id,s);

      list.appendChild(div);
    });
  });
}

document.getElementById('createServerBtn').onclick=async ()=>{
  const name=prompt("Server name?");
  if(!name) return;

  const newRef=push(ref(db,'servers'));
  await set(newRef,{
    name,
    channels:{
      "Chat 1":{messages:{}},
      "Chat 2":{messages:{}},
      "Chat 3":{messages:{}}
    }
  });
};

function enterServer(id,server){
  activeServer=id;

  if(!server.channels) server.channels={};

  ["Chat 1","Chat 2","Chat 3"].forEach(r=>{
    if(!server.channels[r]) server.channels[r]={messages:{}};
  });

  update(ref(db,'servers/'+id),{channels:server.channels});

  renderRooms(server.channels);
  switchRoom("Chat 1");
}

function renderRooms(channels){
  const box=document.getElementById('rooms');
  box.innerHTML='';

  Object.keys(channels||{}).forEach(room=>{
    const div=document.createElement('div');
    div.className='room';
    div.textContent=room;

    div.onclick=()=>switchRoom(room);

    box.appendChild(div);
  });
}

function switchRoom(room){
  activeRoom=room;
  document.getElementById('chatHeader').textContent=room;
  loadMessages();
}

function loadMessages(){
  const msgBox=document.getElementById('messages');
  msgBox.innerHTML='';

  if(!activeServer) return;

  const chatRef=ref(db,`servers/${activeServer}/channels/${activeRoom}/messages`);

  onValue(chatRef,snap=>{
    const data=snap.val()||{};
    msgBox.innerHTML='';

    Object.values(data).forEach(m=>{
      const div=document.createElement('div');

      div.className='message '+(m.userId===userId?'self':'other');

      div.innerHTML=
      `<b>${m.username}</b><br>${m.text}
       <div class="timestamp">
       ${new Date(m.timestamp).toLocaleTimeString()}
       </div>`;

      msgBox.appendChild(div);
    });

    msgBox.scrollTop=msgBox.scrollHeight;
  });
}

document.getElementById('sendButton').onclick=()=>{
  const name=document.getElementById('usernamePrompt').value.trim();
  const text=document.getElementById('messageInput').value.trim();

  if(!name||!text||!activeServer) return;

  const msgRef=push(ref(db,`servers/${activeServer}/channels/${activeRoom}/messages`));

  set(msgRef,{
    username:name,
    text,
    userId,
    timestamp:Date.now()
  });

  document.getElementById('messageInput').value='';
};
</script>

</body>
</html>
