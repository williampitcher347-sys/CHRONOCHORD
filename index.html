<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChronoChord</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{height:100vh;background:linear-gradient(135deg,#0f172a,#020617);color:white;overflow:hidden;}
button{cursor:pointer;transition:.25s;}
button:hover{transform:scale(1.05);}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background:#10b981;border-radius:10px;}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);}

/* Layout */
#app{display:flex;height:100%;flex-direction:row;transition:all 0.3s;}
#sidebar{width:220px;background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;}
#sidebar h2{padding:16px;text-align:center;font-weight:500;letter-spacing:1px;}
#servers{flex:1;overflow:auto;padding:10px;}
.server{padding:8px 12px;border-radius:10px;margin-bottom:6px;cursor:pointer;font-size:.9em;background:rgba(255,255,255,0.05);transition:.25s;}
.server:hover,.server.active{background:linear-gradient(45deg,#2563eb,#10b981);box-shadow:0 0 10px rgba(16,185,129,.6);}
#createServerBtn,#minecraftBtn{margin:10px;padding:8px;border:none;border-radius:10px;background:linear-gradient(45deg,#2563eb,#10b981);color:white;}
#rooms{padding:10px;border-top:1px solid rgba(255,255,255,0.08);}
.room{padding:6px 10px;border-radius:8px;margin-bottom:5px;cursor:pointer;font-size:.85em;transition:.2s;}
.room:hover,.room.active{background:#10b981;}

/* Users panel */
#usersPanel{width:180px;background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);border-left:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;}
#usersPanel h3{padding:14px;font-weight:500;border-bottom:1px solid rgba(255,255,255,0.08);}
#usersList{flex:1;overflow:auto;padding:10px;}
.userItem{padding:6px 8px;border-radius:8px;margin-bottom:5px;font-size:.85em;background:rgba(255,255,255,0.05);}
.userDot{width:8px;height:8px;background:#10b981;border-radius:50%;display:inline-block;margin-right:6px;}

/* Main content */
#main{flex:1;display:flex;flex-direction:column;position:relative;}
#chatHeader{padding:14px;font-weight:500;background:rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(20px);}
#messages{flex:1;overflow:auto;padding:15px;}
.message{max-width:65%;padding:8px 12px;border-radius:12px;margin-bottom:8px;font-size:.85em;animation:msgIn .25s;word-break:break-word;}
.self{margin-left:auto;background:linear-gradient(45deg,#10b981,#059669);}
.other{margin-right:auto;background:#374151;}
.timestamp{font-size:.6em;opacity:.7;text-align:right;line-height:1.1;}

/* Input */
#inputArea{display:flex;padding:10px;gap:6px;background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);}
#inputArea input{padding:8px;border:none;border-radius:8px;background:#020617;color:white;}
#messageInput{flex:1;}
#sendButton{padding:8px 12px;border:none;border-radius:8px;background:linear-gradient(45deg,#2563eb,#10b981);color:white;}

/* Minecraft iframe panel */
#minecraftPanel{display:none;flex:1;position:relative;}
#minecraftPanel iframe{width:100%;height:100%;border:none;}
#mcBackBtn{position:absolute;top:10px;left:10px;padding:6px 12px;border:none;border-radius:6px;background:#10b981;color:white;cursor:pointer;z-index:10;}

/* Animations */
@keyframes msgIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<!-- App -->
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <h2>Servers</h2>
    <div id="servers"></div>
    <button id="createServerBtn">+ Server</button>
    <div id="rooms"></div>
    <button id="minecraftBtn">Play Minecraft</button>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="chatHeader">Chat</div>
    <div id="messages"></div>
    <div id="inputArea">
      <input id="usernamePrompt" placeholder="Name">
      <input id="messageInput" placeholder="Message">
      <button id="sendButton">Send</button>
    </div>

    <!-- Minecraft iframe -->
    <div id="minecraftPanel">
      <button id="mcBackBtn">Back</button>
      <iframe src="https://eaglecraft.org/" id="mcIframe"></iframe>
    </div>
  </div>

  <!-- Users panel -->
  <div id="usersPanel">
    <h3>Online</h3>
    <div id="usersList"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDNRjsEudctz8T1iYlz0AapPZPQBgoIwAQ",
  authDomain: "chronochordbackend.firebaseapp.com",
  databaseURL: "https://chronochordbackend-default-rtdb.firebaseio.com",
  projectId: "chronochordbackend"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let userId='';
let activeServer='';
let activeRoom='Chat 1';

// Auto-login anonymously
signInAnonymously(auth).then(user=>{userId=user.user.uid; initServers();});

// Servers
function initServers(){
  const serversRef = ref(db,'servers');
  onValue(serversRef,snap=>{
    const data = snap.val()||{};
    const list = document.getElementById('servers');
    list.innerHTML='';
    Object.keys(data).forEach(id=>{
      const s = data[id];
      const div = document.createElement('div');
      div.className='server'+(id===activeServer?' active':'');
      div.textContent = s.name;
      div.onclick = ()=>enterServer(id,s);
      list.appendChild(div);
    });
  });
}

// Create server
document.getElementById('createServerBtn').onclick = async ()=>{
  const name = prompt("Server name?");
  if(!name) return;
  const newRef = push(ref(db,'servers'));
  await set(newRef,{
    name,
    channels:{'Chat 1':{messages:{}},'Chat 2':{messages:{}},'Chat 3':{messages:{}}}
  });
};

// Enter server
function enterServer(id, server){
  activeServer=id;
  if(!server.channels) server.channels={};
  ['Chat 1','Chat 2','Chat 3'].forEach(r=>{if(!server.channels[r]) server.channels[r]={messages:{}};});
  update(ref(db,'servers/'+id),{channels:server.channels});
  renderRooms(server.channels);
  switchRoom('Chat 1');
  registerPresence();
}

// Rooms
function renderRooms(channels){
  const box = document.getElementById('rooms'); box.innerHTML='';
  Object.keys(channels||{}).forEach(r=>{
    const div = document.createElement('div');
    div.className='room'+(r===activeRoom?' active':'');
    div.textContent=r;
    div.onclick=()=>switchRoom(r);
    box.appendChild(div);
  });
}

// Switch room
function switchRoom(room){
  activeRoom=room;
  document.getElementById('chatHeader').textContent=room;
  loadMessages();
}

// Load messages
function loadMessages(){
  const msgBox = document.getElementById('messages');
  msgBox.innerHTML='';
  if(!activeServer) return;
  const chatRef = ref(db,`servers/${activeServer}/channels/${activeRoom}/messages`);
  onValue(chatRef,snap=>{
    const data = snap.val()||{};
    msgBox.innerHTML='';
    Object.values(data).forEach(m=>{
      const div = document.createElement('div');
      div.className='message '+(m.userId===userId?'self':'other');
      div.innerHTML = `<div style="font-weight:600;">${m.username}</div>
                       <div style="margin-top:2px;line-height:1.4;">${m.text}</div>
                       <div class="timestamp">${new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>`;
      msgBox.appendChild(div);
    });
  });
}

// Send message
document.getElementById('sendButton').onclick = ()=>{
  const name = document.getElementById('usernamePrompt').value.trim();
  const text = document.getElementById('messageInput').value.trim();
  if(!name || !text || !activeServer) return;
  const msgRef = push(ref(db,`servers/${activeServer}/channels/${activeRoom}/messages`));
  set(msgRef,{username:name,text,userId,timestamp:Date.now()});
  document.getElementById('messageInput').value='';
};

// Presence
function registerPresence(){
  const name = document.getElementById('usernamePrompt').value.trim()||'Guest';
  const userRef = ref(db, `presence/${activeServer}/${userId}`);
  set(userRef,{name,lastActive:Date.now()});
  onDisconnect(userRef).remove();
  listenUsers();
}

function listenUsers(){
  const list = document.getElementById('usersList');
  const presRef = ref(db, `presence/${activeServer}`);
  onValue(presRef,snap=>{
    const data = snap.val()||{};
    list.innerHTML='';
    Object.values(data).forEach(u=>{
      const div=document.createElement('div');
      div.className='userItem';
      div.innerHTML=`<span class="userDot"></span>${u.name}`;
      list.appendChild(div);
    });
  });
}

// Minecraft iframe toggle
const mcBtn = document.getElementById('minecraftBtn');
const mcPanel = document.getElementById('minecraftPanel');
const mcBackBtn = document.getElementById('mcBackBtn');

mcBtn.onclick = ()=>{
  document.getElementById('messages').style.display='none';
  document.getElementById('inputArea').style.display='none';
  mcPanel.style.display='flex';
};

mcBackBtn.onclick = ()=>{
  mcPanel.style.display='none';
  document.getElementById('messages').style.display='block';
  document.getElementById('inputArea').style.display='flex';
};
</script>
</body>
</html>
