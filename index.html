<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronochord</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#fff;display:flex;height:100vh;overflow:hidden;}
#unlockScreen{position:absolute;top:0;left:0;width:100%;height:100%;background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;}
#unlockScreen input{padding:6px;border:none;border-radius:4px;margin-bottom:8px;width:120px;font-size:1em;}
#unlockScreen button{padding:6px 10px;border:none;border-radius:4px;background:#2563eb;color:white;cursor:pointer;}
#app{display:none;width:100%;height:100%;flex-direction:row;transition:all 0.3s;}
#sidebar{width:200px;background:#1e3a8a;display:flex;flex-direction:column;transition:all 0.3s;}
#sidebar h2{text-align:center;padding:12px 0;font-weight:normal;font-size:1.1em;border-bottom:1px solid #0d1117;}
#serverSearch{padding:6px 8px;margin:8px;border-radius:4px;border:none;width:calc(100% - 32px);}
#servers{flex:1;overflow-y:auto;padding:8px;}
.server{padding:6px 10px;border-radius:4px;margin-bottom:4px;cursor:pointer;transition:all 0.2s;display:flex;justify-content:space-between;align-items:center;font-size:0.9em;}
.server:hover,.server.active{background:#2563eb;}
#rooms{margin-top:8px;padding:8px;}
.room{padding:4px 8px;cursor:pointer;border-radius:4px;margin-bottom:4px;transition:all 0.2s;font-size:0.85em;}
.room:hover,.room.active{background:#10b981;}
#main{flex:1;display:flex;flex-direction:column;transition:all 0.3s;}
#chatHeader{padding:12px;background:#1e40af;border-bottom:1px solid #0d1117;font-weight:bold;transition:all 0.3s;font-size:0.95em;}
#messages{flex:1;padding:8px;overflow-y:auto;font-size:0.85em;}
.message{margin-bottom:6px;max-width:70%;padding:6px 10px;border-radius:10px;animation:fadeIn 0.3s;font-size:0.85em;}
.message.self{background:#10b981;margin-left:auto;color:#fff;}
.message.other{background:#6b7280;margin-right:auto;color:#fff;}
.timestamp{display:block;font-size:0.65em;color:#d1d5db;margin-top:1px;text-align:right;}
#inputArea{display:flex;padding:6px;background:#1e40af;border-top:1px solid #0d1117;}
#usernamePrompt{padding:4px;border:none;border-radius:4px;background:#1e3a8a;color:white;width:100px;margin-right:4px;font-size:0.85em;}
#messageInput{flex:1;padding:4px;border:none;border-radius:4px;background:#1e3a8a;color:#fff;font-size:0.85em;}
#messageInput:focus,#usernamePrompt:focus{outline:none;}
#sendButton,#createServerBtn{padding:4px 8px;margin-left:4px;border:none;border-radius:4px;background:#2563eb;color:white;cursor:pointer;transition:all 0.2s;font-size:0.85em;}
#sendButton:hover,#createServerBtn:hover{background:#1d4ed8;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background:#2563eb;border-radius:4px;}
::-webkit-scrollbar-track{background:#1e3a8a;}
</style>
</head>
<body>

<!-- Unlock Screen -->
<div id="unlockScreen">
  <h2>Enter Website Code</h2>
  <input type="password" id="websiteCode" placeholder="Enter code">
  <button id="unlockBtn">Unlock</button>
</div>

<!-- Main App -->
<div id="app">
  <div id="sidebar">
    <h2>Servers</h2>
    <input type="text" id="serverSearch" placeholder="Search server...">
    <div id="servers"></div>
    <button id="createServerBtn">+ Server</button>
    <div id="rooms"></div>
  </div>
  <div id="main">
    <div id="chatHeader">Chat 1</div>
    <div id="messages"></div>
    <div id="inputArea">
      <input type="text" id="usernamePrompt" placeholder="Your name">
      <input type="text" id="messageInput" placeholder="Type a message...">
      <button id="sendButton">Send</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDNRjsEudctz8T1iYlz0AapPZPQBgoIwAQ",
  authDomain: "chronochordbackend.firebaseapp.com",
  databaseURL: "https://chronochordbackend-default-rtdb.firebaseio.com",
  projectId: "chronochordbackend",
  storageBucket: "chronochordbackend.firebasestorage.app",
  messagingSenderId: "321151014715",
  appId: "1:321151014715:web:76cec0fb45aa2c0bfbc91e",
  measurementId: "G-XBRJGYY2G2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let username='', userId='', activeServer='', activeRoom='Chat 1';

const unlockScreen = document.getElementById('unlockScreen');
const unlockBtn = document.getElementById('unlockBtn');
unlockBtn.addEventListener('click', ()=>{
  const code = document.getElementById('websiteCode').value.trim();
  if(code==='2013'){
    unlockScreen.style.display='none';
    document.getElementById('app').style.display='flex';
    startApp();
  } else {
    alert('Incorrect code!');
  }
});

function startApp(){
  signInAnonymously(auth).then(async userCredential=>{
    userId = userCredential.user.uid;

    // Check all servers have default rooms
    const serversSnap = await get(ref(db,'servers'));
    if(!serversSnap.exists()){
      const newServer = push(ref(db,'servers'));
      await set(newServer,{
        name:'Default Server',
        channels:{'Chat 1':{messages:{}},'Chat 2':{messages:{}},'Chat 3':{messages:{}}}
      });
    } else {
      const servers = serversSnap.val();
      for(const s of Object.keys(servers)){
        const ch = servers[s].channels||{};
        let changed=false;
        ['Chat 1','Chat 2','Chat 3'].forEach(r=>{
          if(!ch[r]){ ch[r]={messages:{}}; changed=true; }
        });
        if(changed) update(ref(db,'servers/'+s), {channels:ch});
      }
    }

    initServers();
  });
}

function initServers(){
  const serversRef = ref(db,'servers');
  onValue(serversRef,(snapshot)=>{
    const servers = snapshot.val()||{};
    const serversDiv = document.getElementById('servers');
    serversDiv.innerHTML='';
    Object.keys(servers).forEach(s=>{
      const div = document.createElement('div');
      div.className='server'+(s===activeServer?' active':'');
      div.textContent=servers[s].name;
      div.addEventListener('click',()=>enterServer(s,servers[s]));
      serversDiv.appendChild(div);
    });
    if(!activeServer && Object.keys(servers)[0]){
      enterServer(Object.keys(servers)[0], servers[Object.keys(servers)[0]]);
    }
  });
}

document.getElementById('createServerBtn').addEventListener('click', async ()=>{
  const name = prompt('Server name:');
  if(!name) return;
  const newServerRef = push(ref(db,'servers'));
  await set(newServerRef,{
    name,
    channels:{'Chat 1':{messages:{}},'Chat 2':{messages:{}},'Chat 3':{messages:{}}}
  });
});

function enterServer(id,serverObj){
  activeServer=id;
  activeRoom='Chat 1';
  renderRooms(serverObj.channels);
  document.getElementById('chatHeader').textContent=activeRoom+' - '+serverObj.name;
  loadMessages();
}

function renderRooms(channels){
  const roomsDiv = document.getElementById('rooms');
  roomsDiv.innerHTML='';
  Object.keys(channels).forEach(room=>{
    const div = document.createElement('div');
    div.className='room'+(room===activeRoom?' active':'');
    div.textContent=room;
    div.addEventListener('click',()=>switchRoom(room));
    roomsDiv.appendChild(div);
  });
}

function switchRoom(room){
  activeRoom=room;
  document.querySelectorAll('.room').forEach(r=>r.classList.remove('active'));
  document.querySelectorAll('.room').forEach(r=>{if(r.textContent===room) r.classList.add('active');});
  document.getElementById('chatHeader').textContent=activeRoom;
  loadMessages();
}

document.getElementById('sendButton').addEventListener('click', sendMessage);

function loadMessages(){
  const messagesDiv = document.getElementById('messages');
  messagesDiv.innerHTML='';
  if(activeServer && activeRoom){
    const chatRef = ref(db,`servers/${activeServer}/channels/${activeRoom}/messages`);
    onValue(chatRef,(snapshot)=>{
      const msgs = snapshot.val()||{};
      messagesDiv.innerHTML='';
      Object.values(msgs).forEach(m=>{
        const div = document.createElement('div');
        div.className='message '+(m.userId===userId?'self':'other');
        div.innerHTML=`<strong>${m.username}</strong><span class="timestamp">${new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span><br>${m.text}`;
        messagesDiv.appendChild(div);
      });
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
  }
}

function sendMessage(){
  const input = document.getElementById('messageInput');
  const nameInput = document.getElementById('usernamePrompt');
  if(!input.value.trim()) return;
  if(!nameInput.value.trim()) return alert('Enter your display name!');
  username=nameInput.value.trim();
  const time = Date.now();

  if(activeServer && activeRoom){
    const chatRef = ref(db,`servers/${activeServer}/channels/${activeRoom}/messages`);
    const newMsgRef = push(chatRef);
    set(newMsgRef,{username,text:input.value.trim(),userId,timestamp:time});
  }
  input.value='';
}
</script>
</body>
</html>
